name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

jobs:
  linux-build:
    name: Linux Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm
          cache-dependency-path: npm-shrinkwrap.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Ensure Electron binary is installed
        run: node node_modules/electron/install.js

      - name: Build AppImage
        run: npm run electron:build:linux -- --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist_electron/*.AppImage
            dist_electron/latest-linux.yml
            dist_electron/linux-unpacked/**
          if-no-files-found: error

  windows-build:
    name: Windows Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm
          cache-dependency-path: npm-shrinkwrap.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Ensure Electron binary is installed
        run: node node_modules/electron/install.js

      - name: Build Windows exe from Linux
        run: npm run electron:build:win -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist_electron/*.exe
            dist_electron/win-unpacked/**
          if-no-files-found: error

  macos-build:
    name: macOS Build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          architecture: x64
          cache: npm
          cache-dependency-path: npm-shrinkwrap.json

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_arch: x64
          npm_config_target_arch: x64

      - name: Ensure Electron binary is installed
        run: node node_modules/electron/install.js
        env:
          npm_config_arch: x64
          npm_config_target_arch: x64

      - name: Patch legacy python path for dmg tooling
        run: |
          PY3_BIN="$(command -v python3 || true)"
          if [ ! -x /usr/bin/python ] && [ -n "$PY3_BIN" ]; then
            sed -i '' "s#/usr/bin/python#${PY3_BIN}#g" node_modules/dmg-builder/out/dmg.js
            sed -i '' "s#/usr/bin/python#${PY3_BIN}#g" node_modules/dmg-builder/out/dmg.js.map
          fi

      - name: Build macOS dmg
        run: npm run electron:build -- --mac dmg --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          NOTARIZE: "false"
          npm_config_arch: x64
          npm_config_target_arch: x64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist_electron/*.dmg
            dist_electron/*.zip
            dist_electron/latest-mac.yml
            dist_electron/mac/**
          if-no-files-found: error
