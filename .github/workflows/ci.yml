name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

jobs:
  linux-build:
    name: Linux Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm
          cache-dependency-path: npm-shrinkwrap.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Ensure Electron binary is installed
        run: node node_modules/electron/install.js

      - name: Build AppImage
        run: npm run electron:build:linux -- --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist_electron/*.AppImage
            dist_electron/latest-linux.yml
            dist_electron/linux-unpacked/**
          if-no-files-found: error

  windows-build:
    name: Windows Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm
          cache-dependency-path: npm-shrinkwrap.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Ensure Electron binary is installed
        run: node node_modules/electron/install.js

      - name: Build Windows exe from Linux
        run: npm run electron:build:win -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist_electron/*.exe
          if-no-files-found: error

  macos-build:
    name: macOS Build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          architecture: x64
          cache: npm
          cache-dependency-path: npm-shrinkwrap.json

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_arch: x64
          npm_config_target_arch: x64

      - name: Ensure Electron binary is installed
        run: node node_modules/electron/install.js
        env:
          npm_config_arch: x64
          npm_config_target_arch: x64

      - name: Build macOS app bundle
        run: npm run electron:build -- --mac dir --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          NOTARIZE: "false"
          npm_config_arch: x64
          npm_config_target_arch: x64

      - name: Ad-hoc sign app bundle
        run: |
          set -euo pipefail
          APP_PATH="$(find dist_electron/mac -maxdepth 1 -name '*.app' -type d | head -n1)"
          if [ -z "${APP_PATH:-}" ]; then
            echo "No .app found in dist_electron/mac"
            exit 1
          fi
          xattr -cr "$APP_PATH" || true
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"

      - name: Create DMG from app bundle
        run: |
          set -euo pipefail
          APP_PATH="$(find dist_electron/mac -maxdepth 1 -name '*.app' -type d | head -n1)"
          APP_NAME="$(basename "$APP_PATH" .app)"
          APP_VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="dist_electron/${APP_NAME}-${APP_VERSION}.dmg"
          hdiutil create "$DMG_PATH" -srcfolder "$APP_PATH" -ov -format UDZO
          echo "Created $DMG_PATH"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist_electron/*.dmg
            dist_electron/mac/**
          if-no-files-found: error
